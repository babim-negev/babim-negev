<svg width="980" height="390" viewBox="0 0 980 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Babim Negev SRE Platform Engineer neofetch terminal card</title>
  <desc id="desc">A realistic dark terminal neofetch card showing SRE and platform engineering focus areas.</desc>
  <defs>
    <linearGradient id="border" x1="18" y1="18" x2="962" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(505 210) rotate(90) scale(210 455)">
      <stop stop-color="#064e3b" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .dim { fill: #64748b; }
      .text { fill: #d1fae5; }
      .green { fill: #22c55e; font-weight: 700; }
      .cyan { fill: #22d3ee; }
      .white { fill: #f8fafc; font-weight: 800; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="980" height="390" rx="26" fill="#020617"/>
  <rect width="980" height="390" rx="26" fill="url(#bgGlow)"/>
  <rect x="18" y="18" width="944" height="354" rx="20" stroke="url(#border)" stroke-width="2"/>

  <g transform="translate(44 42)">
    <circle cx="10" cy="10" r="6.5" fill="#ff5f57"/>
    <circle cx="32" cy="10" r="6.5" fill="#ffbd2e"/>
    <circle cx="54" cy="10" r="6.5" fill="#28c840"/>
    <text x="88" y="16" class="mono dim" font-size="15">babim@platform:~</text>
  </g>

  <g class="mono" transform="translate(74 95)">
    <text x="0" y="0" class="cyan" font-size="18" xml:space="preserve">          .--.</text>
    <text x="0" y="26" class="cyan" font-size="18" xml:space="preserve">      .--'    '--.</text>
    <text x="0" y="52" class="cyan" font-size="18" xml:space="preserve">   .-'   k8s      '-.</text>
    <text x="0" y="78" class="cyan" font-size="18" xml:space="preserve">  /  obs   |   slo   \</text>
    <text x="0" y="104" class="cyan" font-size="18" xml:space="preserve"> |---------+---------|</text>
    <text x="0" y="130" class="cyan" font-size="18" xml:space="preserve">  \  iac   |   ci    /</text>
    <text x="0" y="156" class="cyan" font-size="18" xml:space="preserve">   '-.   linux   .-'</text>
    <text x="0" y="182" class="cyan" font-size="18" xml:space="preserve">      '--.____.--'</text>
    <text x="0" y="218" class="green" font-size="17">production: boring</text>
  </g>

  <g class="mono" transform="translate(416 92)">
    <text x="0" y="0" class="white" font-size="25">babim@platform</text>
    <text x="0" y="30" class="dim" font-size="16">------------------------------</text>

    <text x="0" y="66" font-size="17"><tspan class="green">Role</tspan><tspan class="dim">:</tspan><tspan class="text"> SRE / Platform Engineer</tspan></text>
    <text x="0" y="96" font-size="17"><tspan class="green">Host</tspan><tspan class="dim">:</tspan><tspan class="text"> production platforms</tspan></text>
    <text x="0" y="126" font-size="17"><tspan class="green">Kernel</tspan><tspan class="dim">:</tspan><tspan class="text"> Linux / Kubernetes</tspan></text>
    <text x="0" y="156" font-size="17"><tspan class="green">Shell</tspan><tspan class="dim">:</tspan><tspan class="text"> Bash + Python automation</tspan></text>
    <text x="0" y="186" font-size="17"><tspan class="green">Monitoring</tspan><tspan class="dim">:</tspan><tspan class="text"> Prometheus / Grafana / Loki</tspan></text>
    <text x="0" y="216" font-size="17"><tspan class="green">IaC</tspan><tspan class="dim">:</tspan><tspan class="text"> Terraform / Ansible / GitOps</tspan></text>
    <text x="0" y="246" font-size="17"><tspan class="green">On-call</tspan><tspan class="dim">:</tspan><tspan class="text"> actionable alerts only</tspan></text>

    <text x="0" y="292" class="cyan" font-size="17">$ neofetch --sre</text>
    <rect x="160" y="276" width="10" height="20" rx="2" fill="#22c55e" class="cursor"/>
  </g>
</svg>
