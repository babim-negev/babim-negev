<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Babim Negev production platform console</title>
  <desc id="desc">Animated SRE and Platform Engineering console with reliability, observability, automation, and Bash Forces ownership signals.</desc>
  <defs>
    <linearGradient id="border" x1="24" y1="24" x2="1076" y2="496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(560 250) rotate(90) scale(250 540)">
      <stop stop-color="#0f766e" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #f8fafc; }
      .muted { fill: #94a3b8; }
      .dim { fill: #64748b; }
      .green { fill: #22c55e; }
      .cyan { fill: #22d3ee; }
      .amber { fill: #fbbf24; }
      .panel { fill: #07111f; stroke: #143042; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 2.4s ease-in-out infinite; animation-delay: .8s; transform-origin: center; }
      .pulse3 { animation: pulse 2.4s ease-in-out infinite; animation-delay: 1.6s; transform-origin: center; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      .bar1 { animation: bar 3s ease-in-out infinite; transform-origin: left; }
      .bar2 { animation: bar 3s ease-in-out infinite; animation-delay: .4s; transform-origin: left; }
      .bar3 { animation: bar 3s ease-in-out infinite; animation-delay: .8s; transform-origin: left; }
      @keyframes pulse {
        0%, 100% { opacity: .55; }
        50% { opacity: 1; }
      }
      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }
      @keyframes bar {
        0%, 100% { transform: scaleX(.72); opacity: .65; }
        50% { transform: scaleX(1); opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1100" height="520" rx="32" fill="#020617"/>
  <rect width="1100" height="520" rx="32" fill="url(#glow)"/>
  <g filter="url(#cardShadow)">
    <rect x="24" y="24" width="1052" height="472" rx="24" fill="#030712" stroke="url(#border)" stroke-width="2"/>
  </g>

  <g transform="translate(54 54)">
    <circle cx="10" cy="10" r="7" fill="#ff5f57"/>
    <circle cx="34" cy="10" r="7" fill="#ffbd2e"/>
    <circle cx="58" cy="10" r="7" fill="#28c840"/>
    <text x="90" y="16" class="mono muted" font-size="15">platform-console / production</text>
  </g>

  <g transform="translate(58 104)">
    <text class="sans white" x="0" y="0" font-size="34" font-weight="800">Babim Negev</text>
    <text class="mono green" x="0" y="32" font-size="18">SRE / Platform Engineering Owner</text>
    <text class="mono muted" x="0" y="64" font-size="16">owner: bash-forces.ru</text>

    <rect x="0" y="98" width="440" height="184" rx="18" class="panel"/>
    <text x="24" y="132" class="mono cyan" font-size="17">$ platformctl status --owner babim</text>
    <rect x="376" y="116" width="10" height="20" rx="2" fill="#22c55e" class="cursor"/>

    <text x="24" y="170" class="mono muted" font-size="15">SCOPE</text>
    <text x="142" y="170" class="mono white" font-size="15">reliability | observability | automation</text>
    <text x="24" y="202" class="mono muted" font-size="15">RUNTIME</text>
    <text x="142" y="202" class="mono white" font-size="15">Linux | Kubernetes | containers</text>
    <text x="24" y="234" class="mono muted" font-size="15">DELIVERY</text>
    <text x="142" y="234" class="mono white" font-size="15">Terraform | Ansible | CI/CD</text>
    <text x="24" y="266" class="mono muted" font-size="15">OBJECTIVE</text>
    <text x="142" y="266" class="mono green" font-size="15">make production boring</text>
  </g>

  <g transform="translate(548 104)">
    <rect x="0" y="0" width="470" height="112" rx="18" class="panel"/>
    <circle cx="38" cy="38" r="8" class="green pulse"/>
    <text x="62" y="44" class="mono white" font-size="17">SLO status</text>
    <text x="62" y="78" class="mono green" font-size="26" font-weight="800">healthy</text>
    <text x="238" y="44" class="mono muted" font-size="15">alerts</text>
    <text x="238" y="78" class="mono white" font-size="24" font-weight="800">actionable</text>
    <text x="364" y="44" class="mono muted" font-size="15">toil</text>
    <text x="364" y="78" class="mono white" font-size="24" font-weight="800">low</text>

    <rect x="0" y="136" width="470" height="146" rx="18" class="panel"/>
    <text x="24" y="172" class="mono cyan" font-size="17">observability pipeline</text>
    <text x="24" y="210" class="mono muted" font-size="15">metrics</text>
    <rect x="120" y="198" width="270" height="10" rx="5" fill="#0f172a"/>
    <rect class="bar1" x="120" y="198" width="270" height="10" rx="5" fill="#22c55e"/>
    <text x="24" y="242" class="mono muted" font-size="15">logs</text>
    <rect x="120" y="230" width="230" height="10" rx="5" fill="#0f172a"/>
    <rect class="bar2" x="120" y="230" width="230" height="10" rx="5" fill="#22d3ee"/>
    <text x="24" y="274" class="mono muted" font-size="15">traces</text>
    <rect x="120" y="262" width="250" height="10" rx="5" fill="#0f172a"/>
    <rect class="bar3" x="120" y="262" width="250" height="10" rx="5" fill="#fbbf24"/>
  </g>

  <g transform="translate(58 420)">
    <circle cx="8" cy="8" r="6" class="green pulse"/>
    <text x="26" y="13" class="mono muted" font-size="15">Kubernetes</text>
    <circle cx="136" cy="8" r="6" class="cyan pulse2"/>
    <text x="154" y="13" class="mono muted" font-size="15">Prometheus</text>
    <circle cx="276" cy="8" r="6" class="amber pulse3"/>
    <text x="294" y="13" class="mono muted" font-size="15">Grafana</text>
    <circle cx="396" cy="8" r="6" class="green pulse"/>
    <text x="414" y="13" class="mono muted" font-size="15">Terraform</text>
    <text x="720" y="13" class="mono dim" font-size="15">production is a practice, not a place</text>
  </g>
</svg>
